<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="128"
   height="128"
   viewBox="0 0 128 128"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Poop emoji (pile of poo) -->
  <!-- Main pile shape -->
  <path d="M 50,80 Q 40,70 45,55 Q 50,40 64,35 Q 78,40 83,55 Q 88,70 78,80 Q 75,85 64,88 Q 53,85 50,80 Z" fill="#8B6F47" filter="url(#shadow)"/>
  
  <!-- Additional pile layers for 3D effect -->
  <path d="M 48,82 Q 42,75 46,62 Q 50,50 64,46 Q 76,50 80,62 Q 84,75 76,82 Q 73,87 64,89 Q 55,87 48,82 Z" fill="#A0826D"/>
  
  <!-- Top swirl -->
  <path d="M 56,48 Q 60,42 64,42 Q 68,42 71,48 Q 70,55 64,56 Q 58,55 56,48 Z" fill="#9D7E5D"/>
  
  <!-- Left eye -->
  <ellipse cx="55" cy="60" rx="4" ry="6" fill="#1a1a1a"/>
  <ellipse cx="55" cy="61" rx="1.5" ry="2" fill="white"/>
  
  <!-- Right eye -->
  <ellipse cx="73" cy="60" rx="4" ry="6" fill="#1a1a1a"/>
  <ellipse cx="73" cy="61" rx="1.5" ry="2" fill="white"/>
  
  <!-- Smile -->
  <path d="M 58,70 Q 64,75 70,70" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Rosy cheeks -->
  <circle cx="48" cy="67" r="5" fill="#FF9999" opacity="0.6"/>
  <circle cx="80" cy="67" r="5" fill="#FF9999" opacity="0.6"/>
</svg>
